services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linkito
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/linkito
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      JWT_SEGREDO: ${JWT_SEGREDO:-changeit-changeit-changeit-changeit-changeit}
      JWT_EXPIRACAO: ${JWT_EXPIRACAO:-3600000}
    depends_on:
      - postgres

volumes:
  postgres_data:
