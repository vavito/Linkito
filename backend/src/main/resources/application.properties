# Perfil padrao para execucoes locais sem configuracao explicita, como o Run do IntelliJ.
spring.profiles.default=local

# Configuracoes da aplicacao (usa variaveis de ambiente quando disponiveis)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkito}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.segredo=${JWT_SEGREDO:changeit-changeit-changeit-changeit-changeit}
jwt.expiracao-ms=${JWT_EXPIRACAO:3600000}

# Servidor
server.port=${PORT:8080}
spring.application.name=linkito

# Health check para plataformas de deploy
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
