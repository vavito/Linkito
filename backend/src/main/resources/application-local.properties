# Perfil local para rodar o backend contra um PostgreSQL instalado na maquina.
# Ative com: .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkito}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.segredo=${JWT_SEGREDO:local-dev-secret-change-me-change-me-change-me-123456}
jwt.expiracao-ms=${JWT_EXPIRACAO:3600000}

server.port=${PORT:8080}
spring.application.name=linkito
